name: Update queue data

on:
  workflow_dispatch:
    inputs:
      refresh_links:
        description: "Also rebuild project_links.csv"
        required: false
        default: true
        type: boolean

  schedule:
    # Taiwan 09:30 = UTC 01:30
    - cron: "30 1 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build official project links
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.refresh_links) }}
        run: python build_project_links.py

      - name: Scrape detail queue lists
        run: python scrape_all_detail_lists.py

      - name: Debug after scrape
        run: |
          echo "=== current repo ==="
          pwd
          git remote -v
          git branch --show-current
          git rev-parse HEAD

          echo "=== file dates after scrape ==="
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          for file in [
              "detail_queue_records.csv",
              "detail_queue_stats.csv",
              "detail_queue_stats_history.csv",
          ]:
              print("\n===", file, "===")
              p = Path(file)
              print("exists:", p.exists())
              if not p.exists():
                  continue

              df = pd.read_csv(p, encoding="utf-8-sig")
              print("shape:", df.shape)
              print("columns:", df.columns.tolist())

              if "抓取日期" in df.columns:
                  print(
                      "抓取日期:",
                      df["抓取日期"].dropna().astype(str).drop_duplicates().tail(20).to_list()
                  )
          PY

          echo "=== git status after scrape ==="
          git status --short

          echo "=== git diff stat after scrape ==="
          git diff --stat

      - name: Analyze queue progress
        run: python analyze_queue_progress.py

      - name: Build event log
        run: python build_event_log.py

      - name: Debug before commit
        run: |
          echo "=== git status before commit ==="
          git status --short

          echo "=== git diff stat before commit ==="
          git diff --stat

          echo "=== file dates before commit ==="
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          for file in [
              "detail_queue_records.csv",
              "detail_queue_stats.csv",
              "detail_queue_stats_history.csv",
              "queue_progress_analysis.csv",
              "queue_event_log.csv",
          ]:
              print("\n===", file, "===")
              p = Path(file)
              print("exists:", p.exists())
              if not p.exists():
                  continue

              df = pd.read_csv(p, encoding="utf-8-sig")
              print("shape:", df.shape)

              for col in ["抓取日期", "事件日期"]:
                  if col in df.columns:
                      print(
                          col + ":",
                          df[col].dropna().astype(str).drop_duplicates().tail(20).to_list()
                      )
          PY

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add project_links.csv
          git add detail_queue_records.csv
          git add detail_queue_stats.csv
          git add detail_queue_stats_history.csv
          git add queue_progress_analysis.csv
          git add queue_event_log.csv

          echo "=== staged changes ==="
          git status --short

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Update queue data"
            git push origin HEAD:main
          fi
