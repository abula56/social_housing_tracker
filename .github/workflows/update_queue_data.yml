name: Daily private tracker

on:
  workflow_dispatch:
    inputs:
      refresh_links:
        description: "Also rebuild project_links.csv"
        required: false
        default: false
        type: boolean

  schedule:
    # Taiwan 09:30 = UTC 01:30
    # Monday-Saturday: daily tracker only
    - cron: "30 1 * * 1-6"
    # Sunday: rebuild project links, then run tracker
    - cron: "30 1 * * 0"

permissions:
  contents: write

jobs:
  update-private-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Build official project links
        if: ${{ (github.event_name == 'schedule' && github.event.schedule == '30 1 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.refresh_links) }}
        run: python build_project_links.py

      - name: Scrape detail queue lists
        run: python scrape_all_detail_lists.py

      - name: Analyze queue progress
        run: python analyze_queue_progress.py

      - name: Build event log
        run: python build_event_log.py

      - name: Commit updated tracker data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update private queue tracker data"
          file_pattern: |
            project_links.csv
            detail_queue_records.csv
            detail_queue_stats.csv
            detail_queue_stats_history.csv
            queue_progress_analysis.csv
            queue_event_log.csv
            daily_queue_summary.txt
